server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5433/collab_auth}
    username: ${AUTH_DB_USERNAME:collab}
    password: ${AUTH_DB_PASSWORD:collab}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history
    baseline-on-migrate: true

jwt:
  # Must be >= 32 chars (256 bits) for HMAC-SHA256
  secret: ${AUTH_JWT_SECRET:9fK2mL8xQ1pZ7vNc4rTy6uHs3aWd0eBj}
  issuer: collab-platform
  access-token-validity-seconds: 3600

google:
  client-id: ${GOOGLE_CLIENT_ID:dummy-client-id}
