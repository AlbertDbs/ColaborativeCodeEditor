server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5433/collab_auth}
    username: ${AUTH_DB_USERNAME:collab}
    password: ${AUTH_DB_PASSWORD:collab}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history
    baseline-on-migrate: true

jwt:
  secret: ${AUTH_JWT_SECRET:dev-secret-change-me}
  issuer: collab-platform
  access-token-validity-seconds: 3600
