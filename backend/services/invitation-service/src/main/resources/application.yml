server:
  port: 8084

spring:
  application:
    name: invitation-service
  datasource:
    url: ${INVITE_DB_URL:jdbc:postgresql://localhost:5433/collab_invite}
    username: ${INVITE_DB_USERNAME:collab}
    password: ${INVITE_DB_PASSWORD:collab}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${AUTH_JWT_SECRET:9fK2mL8xQ1pZ7vNc4rTy6uHs3aWd0eBj}
  issuer: collab-platform

internal:
  api-key: ${INTERNAL_API_KEY:internal-secret}
