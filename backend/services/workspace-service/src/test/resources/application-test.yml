server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:workspacedb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: test-secret-should-be-at-least-32-bytes-long!
  issuer: collab-platform
