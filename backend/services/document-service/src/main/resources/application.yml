server:
  port: 8085

spring:
  application:
    name: document-service
  datasource:
    url: ${DOC_DB_URL:jdbc:postgresql://localhost:5433/collab_document}
    username: ${DOC_DB_USERNAME:collab}
    password: ${DOC_DB_PASSWORD:collab}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${AUTH_JWT_SECRET:9fK2mL8xQ1pZ7vNc4rTy6uHs3aWd0eBj}
  issuer: collab-platform

services:
  workspace:
    url: ${WORKSPACE_SERVICE_URL:http://localhost:8083}
  invitation:
    url: ${INVITATION_SERVICE_URL:http://localhost:8084}

internal:
  api-key: ${INTERNAL_API_KEY:internal-secret}
